services:
  mongodb:
    image: mongo:8
    container_name: audex-mongodb
    ports:
      - "27017:27017"
    volumes:
      - audex-mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: audex

  redis:
    image: redis:7-alpine
    container_name: audex-redis
    ports:
      - "6379:6379"
    volumes:
      - audex-redis-data:/data

  mongo-express:
    image: mongo-express:latest
    container_name: audex-mongo-express
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongodb:27017/
    depends_on:
      - mongodb

volumes:
  audex-mongo-data:
  audex-redis-data:
