name: Main Branch

on:
  push:
    branches: [master, main]

concurrency:
  group: main-${{ github.sha }}
  cancel-in-progress: true

jobs:
  test:
    name: Full Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      mongodb:
        image: mongo:8
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      MONGODB_URI: mongodb://localhost:27017/audex_test
      REDIS_URL: redis://localhost:6379
      REDIS_TLS: "false"
      AUTH_SECRET: test-secret-at-least-32-characters-long

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Run database migrations
        run: pnpm db:migrate:up

      - name: Unit tests
        run: pnpm test:unit

      - name: Integration tests
        run: pnpm test:integration
        continue-on-error: true

  deploy-staging:
    name: Deploy to Vercel Staging
    runs-on: ubuntu-latest
    needs: test
    if: success()
    timeout-minutes: 10

    steps:
      - name: Check Vercel secrets
        id: vercel-secrets
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Vercel secrets not configured — skipping deploy."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.vercel-secrets.outputs.configured == 'true'
        uses: actions/checkout@v4

      - name: Deploy to Vercel (Preview)
        if: steps.vercel-secrets.outputs.configured == 'true'
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./

  smoke:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: success()
    timeout-minutes: 5

    steps:
      - name: Health check
        run: |
          echo "Smoke test placeholder"
          echo "Will verify staging health endpoint once deployed"
          # curl -f "${{ secrets.STAGING_URL }}/api/health" || exit 1
