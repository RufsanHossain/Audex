name: Security Audit

on:
  schedule:
    - cron: "23 7 * * 1"
  workflow_dispatch:

permissions:
  security-events: write
  contents: read

jobs:
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit --audit-level=critical
        continue-on-error: true

      - name: Check for known vulnerabilities
        run: pnpm audit --audit-level=high || echo "::warning::High severity vulnerabilities found"

  secret-scanning:
    name: Secret Scanning
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog scan
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

  # CodeQL is disabled until the repo is public or GitHub Advanced Security
  # is enabled. With neither, the analyze step fails with "repository not
  # found" because the Code Scanning API rejects SARIF uploads. Re-enable
  # by restoring the `codeql:` job below.
  #
  # codeql:
  #   name: CodeQL Analysis
  #   runs-on: ubuntu-latest
  #   timeout-minutes: 10
  #   permissions:
  #     security-events: write
  #   steps:
  #     - name: Checkout
  #       uses: actions/checkout@v4
  #     - name: Initialize CodeQL
  #       uses: github/codeql-action/init@v3
  #       with:
  #         languages: javascript-typescript
  #     - name: Perform CodeQL analysis
  #       uses: github/codeql-action/analyze@v3

  license-check:
    name: License Compliance
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check licenses
        run: |
          npx license-checker --production --failOn "GPL-2.0;GPL-3.0;AGPL-1.0;AGPL-3.0" --summary || echo "::warning::Copyleft license detected"
